 <!DOCTYPE html>

<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PCZONE Admin</title>

  <link rel="stylesheet" href="css/ADMIN.CSS">

  <!-- Google Material Icons -->

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<!-- ===== HEADER ===== -->

<header class="admin-header">

  <div class="header-left">

    <button id="sidebarToggle" class="icon-btn" title="Toggle sidebar">

      <span class="material-icons">menu</span>

    </button>

    <div class="logo">

      <span class="material-icons">computer</span>

      <span class="logo-text">PCZONE <span class="logo-admin">ADMIN</span></span>

    </div>

  </div>

  <div class="header-center">

    <a href="main+ds+sp.html" class="btn-home" title="Về trang chủ">

      <span class="material-icons">home</span>

      <span>Về trang chủ</span>

    </a>

  </div>

  <div class="header-right">

    <button class="icon-btn notif-btn" id="notifBtn" title="Thông báo">

      <span class="material-icons">notifications</span>

      <span class="notif-badge" id="notifBadge">4</span>

    </button>

    <!-- Notification Dropdown -->

    <div class="notif-dropdown" id="notifDropdown">

      <div class="notif-header">Thông báo <span id="notifCount">4</span></div>

      <div id="notifList"></div>

      <div class="notif-footer">Xem tất cả</div>

    </div>

    <div class="admin-info">

      <div class="admin-avatar" id="adminAvatar">A</div>

      <span class="admin-name" id="adminName">Admin</span>

    </div>

    <button class="icon-btn logout-btn" id="adminLogoutBtn" title="Đăng xuất">

      <span class="material-icons">logout</span>

    </button>

  </div>

</header>

<!-- ===== LAYOUT ===== -->

<div class="admin-layout">

  <!-- ===== SIDEBAR ===== -->

  <aside class="admin-sidebar" id="sidebar">

    <nav class="sidebar-nav">

      <div id="menuContainer"></div>

    </nav>

  </aside>

  <!-- ===== MAIN CONTENT ===== -->

  <main class="admin-main" id="mainContent">

    <!-- Nội dung được render bởi JS -->

  </main>

</div>

<!-- ===== MODAL: Thêm/Sửa Sản Phẩm ===== -->

<div class="modal-overlay" id="productModal">

  <div class="modal-box">

    <div class="modal-header">

      <h2 id="modalTitle">Thêm sản phẩm</h2>

      <button class="icon-btn" onclick="closeModal()">

        <span class="material-icons">close</span>

      </button>

    </div>

    <div class="modal-body">

      <div class="form-grid" style="grid-template-columns: repeat(4, 1fr);">

        <div class="form-group">

          <label>Tên sản phẩm *</label>

          <input type="text" id="p-name" placeholder="VD: Intel Core i9-13900K">

        </div>

        <div class="form-group">

          <label>Thương hiệu</label>

          <input type="text" id="p-brand" placeholder="VD: Intel, AMD, NVIDIA...">

        </div>

        <div class="form-group">

          <label>Danh mục</label>

          <select id="p-category">

            <option value="">-- Chọn danh mục --</option>

            <option>CPU</option>

            <option>GPU</option>

            <option>RAM</option>

            <option>SSD</option>

            <option>Mainboard</option>

            <option>PSU</option>

            <option>Case</option>

            <option>Laptop</option>

          </select>

        </div>

        <div class="form-group">

          <label>Giá (VNĐ) *</label>

          <input type="number" id="p-price" placeholder="VD: 15000000">

        </div>

        <div class="form-group">

          <label>Giá khuyến mãi</label>

          <input type="number" id="p-sale" placeholder="Để trống nếu không có">

        </div>

        <div class="form-group">

          <label>Số lượng *</label>

          <input type="number" id="p-qty" placeholder="VD: 50">

        </div>

        <div class="form-group">

          <label>URL ảnh đại diện</label>

          <input type="text" id="p-img" placeholder="https://...">

        </div>

        <div class="form-group">

          <label>Trạng thái</label>

          <select id="p-status">

            <option value="Còn hàng">Còn hàng</option>

            <option value="Sắp hết">Sắp hết</option>

            <option value="Hết hàng">Hết hàng</option>

          </select>

        </div>

        <div class="form-group" style="grid-column: span 2;">

          <label>Mô tả ngắn</label>

          <input type="text" id="p-desc" placeholder="Mô tả ngắn gọn về sản phẩm">

        </div>

        <div class="form-group" style="grid-column: span 2;">

          <label>Thông số kỹ thuật</label>

          <textarea id="p-specs" rows="3" placeholder="VD: Socket LGA1700, TDP 125W, 24 nhân..."></textarea>

        </div>

      </div>

    </div>

    <div class="modal-footer">

      <button class="btn-secondary" onclick="closeModal()">Hủy</button>

      <button class="btn-primary" onclick="saveProduct()">Lưu sản phẩm</button>

    </div>

  </div>

</div>

<!-- ===== MODAL: Xác nhận xóa ===== -->

<div class="modal-overlay" id="confirmModal">

  <div class="modal-box modal-sm">

    <div class="modal-header">

      <h2>Xác nhận xóa</h2>

      <button class="icon-btn" onclick="closeConfirm()">

        <span class="material-icons">close</span>

      </button>

    </div>

    <div class="modal-body">

      <p id="confirmMsg">Bạn có chắc muốn xóa không?</p>

    </div>

    <div class="modal-footer">

      <button class="btn-secondary" onclick="closeConfirm()">Hủy</button>

      <button class="btn-danger" id="confirmOkBtn">Xóa</button>

    </div>

  </div>

</div>

<!-- Toast thông báo -->

<div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/product-service.js"></script>

<script src="js/data-products.js"></script>

<script src="js/data-customers.js"></script>

<script src="js/ADMIN.JS"></script>

</body>

</html>
