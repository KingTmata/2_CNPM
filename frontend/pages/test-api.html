<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API PCZONE</title>
    <link rel="stylesheet" href="../css/test-api.css">
</head>
<body>
    <h1>Test API Backend PCZONE</h1>
    <button onclick="testAPI()">Gọi API /api/test</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const div = document.getElementById('result');
            div.innerHTML = '<p>Đang gọi API...</p>';
            
            try {
                const response = await fetch('http://localhost:5042/api/test');
                const data = await response.json();
                div.innerHTML = `
                    <h3>Kết quả:</h3>
                    <pre class="success">${JSON.stringify(data, null, 2)}</pre>
                    <p class="success">✅ Backend hoạt động!</p>
                `;
            } catch (error) {
                div.innerHTML = `
                    <h3>Lỗi:</h3>
                    <pre class="error">${error.message}</pre>
                    <p class="error">❌ Không thể kết nối đến backend</p>
                `;
            }
        }
    </script>
</body>
</html>
